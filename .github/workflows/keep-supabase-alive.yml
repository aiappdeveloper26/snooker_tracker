name: Keep Supabase Alive

# Runs every 3 days to prevent Supabase free tier from pausing
# due to 7 days of inactivity.
on:
  schedule:
    - cron: '0 9 */3 * *'   # Every 3 days at 9:00 AM UTC
  workflow_dispatch:          # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase — snooker_data
        run: |
          echo "Pinging Supabase..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/snooker_data?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Accept: application/json")
          STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS")
          echo "Status: $STATUS"
          echo "Response body: $BODY"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "206" ]; then
            echo "✓ Supabase is alive"
          else
            echo "✗ Failed with status: $STATUS"
            exit 1
          fi
