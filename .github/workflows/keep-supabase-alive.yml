name: Keep Supabase Alive

# Runs every 3 days to prevent Supabase free tier from pausing
# due to 7 days of inactivity.
on:
  schedule:
    - cron: '0 9 */3 * *'   # Every 3 days at 9:00 AM UTC
  workflow_dispatch:          # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase — snooker_data
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/snooker_data?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "snooker_data ping status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: Unexpected status $STATUS"
            exit 1
          fi

      - name: Ping Supabase — sports_data
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/sports_data?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "sports_data ping status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: Unexpected status $STATUS"
            exit 1
          fi
